<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Wild Tea Tree Platform</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <h1>🌿 Register</h1>
            <p class="subtitle">Create your account</p>
            <div id="alert-container"></div>
            <form id="register-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" class="form-control" placeholder="Your name" required minlength="2">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Min 6 characters" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" class="form-control" placeholder="Repeat password" required>
                </div>
                <button type="submit" class="btn btn-primary" id="register-btn">Create Account</button>
            </form>
            <div class="footer">
                Already have an account? <a href="/login">Sign in</a>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
    <script>
        document.getElementById("register-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const alertContainer = document.getElementById("alert-container");
            const btn = document.getElementById("register-btn");

            const password = document.getElementById("password").value;
            const confirm = document.getElementById("confirm-password").value;

            if (password !== confirm) {
                showAlert(alertContainer, "Passwords do not match");
                return;
            }

            btn.textContent = "Creating account...";
            btn.disabled = true;

            try {
                await apiPost("/api/auth/register", {
                    name: document.getElementById("name").value,
                    email: document.getElementById("email").value,
                    password: password,
                });

                showAlert(alertContainer, "Account created! Redirecting to login...", "success");
                setTimeout(() => window.location.href = "/login", 1500);
            } catch (err) {
                showAlert(alertContainer, err.message);
                btn.textContent = "Create Account";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
