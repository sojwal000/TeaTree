<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Wild Tea Tree Platform</title>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        .auth-card h1 { letter-spacing: -0.02em; }
        .auth-card .subtitle { color: rgba(255,255,255,0.7); margin-bottom: 0.5rem; }
        .auth-card .form-group label { font-weight: 600; font-size: 0.85rem; letter-spacing: 0.02em; }
        .auth-card .form-control { border-radius: 10px; padding: 0.7rem 0.9rem; border: 1.5px solid rgba(255,255,255,0.25); }
        .auth-card .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(139,195,74,0.25); }
        .auth-card .btn-primary { border-radius: 10px; padding: 0.75rem; font-size: 1rem; font-weight: 600; letter-spacing: 0.02em; }
        .auth-card .footer a { font-weight: 600; }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <h1>🌿 Login</h1>
            <p class="subtitle">Sign in to the Wild Tea Tree Platform</p>
            <div id="alert-container"></div>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Your password" required>
                </div>
                <button type="submit" class="btn btn-primary" id="login-btn">Sign In</button>
            </form>
            <div class="footer">
                Don't have an account? <a href="/register">Register here</a>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
    <script>
        document.getElementById("login-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.getElementById("login-btn");
            btn.textContent = "Signing in...";
            btn.disabled = true;

            try {
                const data = await apiPost("/api/auth/login", {
                    email: document.getElementById("email").value,
                    password: document.getElementById("password").value,
                });
                setToken(data.access_token);

                // Fetch profile
                const profile = await apiGet("/api/auth/profile");
                setUser(profile);

                window.location.href = "/dashboard";
            } catch (err) {
                showAlert(document.getElementById("alert-container"), err.message);
                btn.textContent = "Sign In";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
